[general]
framerate = 30
bars = 28
autosens = 1
sensitivity = 100
lower_cutoff_freq = 45
higher_cutoff_freq = 14000

[input]
method = pipewire
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
bar_delimiter = 59
frame_delimiter = 10
channels = mono
mono_option = average

[smoothing]
noise_reduction = 68
monstercat = 1
waves = 0
